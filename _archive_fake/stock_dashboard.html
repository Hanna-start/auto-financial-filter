<html lang="ko">

    <meta name="description" content="AI 기반 고성능 재무 건전성 주식 필터링 시스템 대시보드">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-dark: #090d16;
            --panel-bg: rgba(17, 25, 40, 0.65);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-primary: #6366f1; /* Indigo */
            --accent-glow: rgba(99, 102, 241, 0.15);
            --success: #10b981; /* Emerald */
            --success-glow: rgba(16, 185, 129, 0.15);
            --danger: #f43f5e; /* Rose */
            --danger-glow: rgba(244, 63, 94, 0.15);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-blur: blur(12px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.08) 0%, transparent 40%);
            background-attachment: fixed;
            padding-bottom: 50px;
        }

        /* Header Styles */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(9, 13, 22, 0.7);
            backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 30%, var(--accent-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo i {
            background: linear-gradient(135deg, var(--accent-primary), #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
        }

        .header-meta {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(16, 185, 129, 0.2);
            font-weight: 500;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 40px auto 0;
            padding: 0 20px;
        }

        /* KPI Section */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .kpi-card {
            background: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .kpi-card:hover {
            transform: translateY(-5px);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 12px 30px var(--accent-glow);
        }

        .kpi-card:hover::before {
            transform: translateX(100%);
        }

        .kpi-info h3 {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .kpi-info .value {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .kpi-icon {
            width: 54px;
            height: 54px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            background: rgba(99, 102, 241, 0.1);
            color: var(--accent-primary);
            border: 1px solid rgba(99, 102, 241, 0.15);
        }

        .kpi-card.success .kpi-icon {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border-color: rgba(16, 185, 129, 0.15);
        }

        /* Visualization Section */
        .viz-section {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 25px;
            margin-bottom: 40px;
        }

        .panel {
            background: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 30px;
        }

        .panel-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 4px solid var(--accent-primary);
            padding-left: 12px;
        }

        .chart-container {
            position: relative;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Showcase Cards (Passed Stocks) */
        .showcase-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .showcase-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .showcase-card {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.05), rgba(17, 25, 40, 0.8));
            backdrop-filter: var(--glass-blur);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 18px;
            padding: 24px;
            transition: all 0.3s ease;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .showcase-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--success);
            box-shadow: 0 15px 35px var(--success-glow);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .ticker-badge {
            background: linear-gradient(135deg, var(--success), #059669);
            color: #fff;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .market-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .company-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .card-metrics {
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 15px;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
        }

        .metric-label-text {
            color: var(--text-muted);
        }

        .metric-val {
            font-weight: 500;
            color: var(--success);
        }

        .pass-tag {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        /* Table Section */
        .table-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 20px;
        }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-box input {
            width: 100%;
            background: rgba(17, 25, 40, 0.8);
            border: 1px solid var(--border-color);
            padding: 12px 16px 12px 46px;
            border-radius: 12px;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
        }

        .filter-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .filter-btn.active, .filter-btn:hover {
            background: var(--accent-primary);
            color: #fff;
            border-color: var(--accent-primary);
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .table-container {
            overflow-x: auto;
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.95rem;
            background: rgba(17, 25, 40, 0.4);
        }

        th {
            background: rgba(9, 13, 22, 0.8);
            color: var(--text-muted);
            font-weight: 500;
            padding: 18px 24px;
            border-bottom: 1px solid var(--border-color);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        td {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-main);
            transition: background 0.2s;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .badge.pass {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .badge.fail {
            background: rgba(244, 63, 94, 0.1);
            color: var(--danger);
            border: 1px solid rgba(244, 63, 94, 0.2);
        }

        .table-ticker {
            font-weight: 700;
            color: var(--accent-primary);
        }

        .reason-text {
            font-size: 0.85rem;
            color: var(--danger);
            background: rgba(244, 63, 94, 0.05);
            padding: 4px 10px;
            border-radius: 6px;
            display: inline-block;
        }

        @media (max-width: 1024px) {
            .viz-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

            </div>
            
            <div class="panel">

                <div class="chart-container">
                    <canvas id="reasonsChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Passed Stocks Showcase -->

        <!-- Full Interactive Table -->
        <div class="panel">
            <div class="panel-title"><i class="fa-solid fa-list-check"></i> 전체 분석 대상 기업 상세 현황</div>
            
            <div class="table-controls">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="기업명 또는 티커로 검색...">
                </div>
                <div class="filter-buttons">
                    <button class="filter-btn active" onclick="filterTable('all')">전체</button>
                    <button class="filter-btn" onclick="filterTable('PASS')">통과 (PASS)</button>
                    <button class="filter-btn" onclick="filterTable('FAIL')">탈락 (FAIL)</button>
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>티커</th>
                            <th>기업명</th>
                            <th>시장</th>
                            <th>1단계 (유동성)</th>
                            <th>2단계 (재무건전성)</th>
                            <th>최종 결과</th>

                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Dynamically populated -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

        // Render showcase cards
        const showcaseContainer = document.getElementById('showcase-container');
        const passedStocks = stockData.filter(s => s.final_result === 'PASS');
        
        passedStocks.forEach(stock => {
            const card = document.createElement('div');
            card.className = 'showcase-card';
            card.innerHTML = `
                <div class="card-header">
                    <span class="ticker-badge">${stock.symbol}</span>
                    <span class="market-label">${stock.market}</span>
                </div>
                <div class="company-name">${stock.name}</div>
                <div class="card-metrics">
                    <div class="metric-row">
                        <span class="metric-label-text">1단계 유동성</span>
                        <span class="pass-tag">PASS</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label-text">부채비율 (150%이하)</span>
                        <span class="metric-val">합격</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label-text">매출성장률 (3%이상)</span>
                        <span class="metric-val">합격</span>
                    </div>
                </div>
            `;
            showcaseContainer.appendChild(card);
        });

        // Render Interactive Table
        const tableBody = document.getElementById('tableBody');
        
        function renderTable(data) {
            tableBody.innerHTML = '';
            data.forEach(stock => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="table-ticker">${stock.symbol}</td>
                    <td style="font-weight: 500;">${stock.name}</td>
                    <td>${stock.market}</td>
                    <td><span class="badge ${stock.stage1 === 'PASS' ? 'pass' : 'fail'}">${stock.stage1}</span></td>
                    <td><span class="badge ${stock.stage2 === 'PASS' ? 'pass' : 'fail'}">${stock.stage2}</span></td>
                    <td><span class="badge ${stock.final_result === 'PASS' ? 'pass' : 'fail'}">${stock.final_result}</span></td>
                    <td>${stock.reasons.length > 0 ? `<span class="reason-text">${stock.reasons.join(', ')}</span>` : '-'}</td>
                `;
                tableBody.appendChild(row);
            });
        }

        renderTable(stockData);

        // Filter Table by Search and Buttons
        let currentFilter = 'all';
        const searchInput = document.getElementById('searchInput');

        searchInput.addEventListener('input', () => {
            applyFilters();
        });

        function filterTable(type) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            currentFilter = type;
            applyFilters();
        }

        function applyFilters() {
            const searchVal = searchInput.value.toLowerCase();
            const filtered = stockData.filter(stock => {
                const matchesSearch = stock.name.toLowerCase().includes(searchVal) || stock.symbol.toLowerCase().includes(searchVal);
                const matchesBtn = currentFilter === 'all' || stock.final_result === currentFilter;
                return matchesSearch && matchesBtn;
            });
            renderTable(filtered);
        }
