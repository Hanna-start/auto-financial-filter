# Example configuration for Financial Stock Filter
# 재무 건전성 기반 종목 필터링 시스템 설정

# Liquidity filter parameters (유동성 필터 매개변수)
min_trading_volume_krw: 10000000000  # 10 billion KRW minimum daily average trading volume
trading_volume_period_days: 30       # 30-day period for average calculation

# Financial health filter parameters (재무 건전성 필터 매개변수)
max_debt_ratio_percent: 200.0        # Maximum debt ratio of 200%
min_revenue_growth_percent: 0.0      # Minimum 0% YoY revenue growth (역성장 제외)
cash_flow_quarters: 4                # Number of quarters to analyze for cash flow

# Quality growth filter parameters (품질 성장 필터 매개변수)
min_operating_margin_percent: 5.0    # Minimum 5% operating margin
profit_trend_years: 4                # Years to analyze for profit trend peak
cogs_trend_quarters: 6               # Quarters to analyze for COGS ratio trend

# Data source configuration (데이터 소스 설정)
data_cache_enabled: true             # Enable data caching
data_cache_ttl_hours: 24             # Cache time-to-live in hours
api_retry_attempts: 3                # Number of retry attempts for API calls
api_timeout_seconds: 30              # API timeout in seconds

# Logging configuration (로깅 설정)
log_level: "INFO"                    # Log level: DEBUG, INFO, WARNING, ERROR
log_file_path: null                  # Optional log file path
verbose_output: false                # Enable verbose output